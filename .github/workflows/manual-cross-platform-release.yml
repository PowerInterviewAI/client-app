name: Manual Cross Platform Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish artifacts to GitHub release
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build ${{ matrix.platform }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run tauri:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: error

  publish:
    if: inputs.publish
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Read version
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading artifacts."
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes "Manual cross-platform Tauri build."
          fi
          while IFS= read -r -d '' file; do
            echo "Uploading $(basename "$file")"
            gh release upload "$TAG" "$file" --clobber
          done < <(find release-artifacts -type f \( \
            -name '*.exe' -o -name '*.msi' -o \
            -name '*.dmg' -o -name '*.tar.gz' -o -name '*.zip' \
          \) -print0)
